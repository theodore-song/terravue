name: Hourly agent run

# Runs the agent competition over the stock universe and publishes the results
# to the cloud KV store (which the live Vercel site reads).
on:
  schedule:
    # Hourly on weekdays. GitHub cron is UTC; the site also auto-pulls these
    # updates every hour while it is open.
    - cron: "0 * * * 1-5"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-local.txt

      - name: Run hourly competition and publish to KV
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: python run_daily.py
